      href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Shadows+Into+Light+Two&display=swap"
      rel="stylesheet"
    />
    <script>
      (function (location) {
        if (location.search.startsWith('?/')) {
          var decodedPath = location.search.slice(1).split('&').map(function (part) {
            return part.replace(/~and~/g, '&');
          }).join('?');
          var basePath = location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null, basePath + decodedPath + location.hash);
        }
      })(window.location);
    </script>

  </body>
